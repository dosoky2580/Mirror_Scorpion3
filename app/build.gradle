plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'org.tetocollctionway.mirror'
    compileSdk 34

    defaultConfig {
        applicationId "org.tetocollctionway.mirror"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation "androidx.core:core-ktx:1.12.0"
    implementation "androidx.compose.material3:material3:1.2.1"
}
