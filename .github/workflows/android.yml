name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # تم إلغاء الـ cache تماماً هنا لتجنب Error 400

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Clean and Build APK
      run: ./gradlew clean assembleDebug --no-build-cache --no-daemon --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Mirror-Scorpion-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
