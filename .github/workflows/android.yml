name: Final Build
on:
  push:
    branches: [ "main" ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # أحدث إصدار

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # أحدث إصدار يدعم Node 24
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4 # تحديث النسخة لـ v4 لحل مشكلة الكاش
        with:
          gradle-version: 8.7

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mirror-Pro-Build
          path: app/build/outputs/apk/debug/app-debug.apk
