name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # ملاحظة: تم حذف سطر الـ cache هنا عمداً
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK (Pure Build)
      run: ./gradlew assembleDebug --no-build-cache --no-daemon --stacktrace
