name: Final Build
on:
  push:
    branches: [ "main" ]
jobs:
  android-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # حذفنا سطر الكاش نهائياً لأنه هو اللي بيسبب الـ Error 400
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      # استخدام --no-build-cache بيمنع السيرفر من محاولة حفظ أي ملفات في الكاش المعطل
      run: ./gradlew assembleDebug --no-build-cache --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Mirror-Pro-Build
        path: app/build/outputs/apk/debug/app-debug.apk
